name: CI
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency: # Cancel stale PR builds (but not push builds)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            cpu: amd64
            platform: x64
            builder: ubuntu-latest
          - os: macos
            cpu: arm64
            platform: arm64
            builder: macos-26
        branch: [version-2-0, version-2-2, devel]

    defaults:
      run:
        shell: bash

    name: '${{ matrix.target.os }}-${{ matrix.target.cpu }} (Nim ${{ matrix.branch }})'
    runs-on: ${{ matrix.target.builder }}
    continue-on-error: ${{ matrix.branch == 'devel' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Get Nim commit hash
        id: nim-hash
        uses: actions/github-script@v8
        with:
          script: |
            const branch = "${{ matrix.branch }}";
            const res = await github.rest.repos.getBranch({
              owner: "nim-lang",
              repo: "Nim",
              branch: branch,
            });
            const sha = res.data.commit.sha;
            core.setOutput("nim_commit_hash", sha);
            core.exportVariable("NIM_COMMIT_HASH", sha);

      - name: Restore Nim build from cache
        id: nim-cache
        uses: actions/cache@v5
        with:
          path: |
            nim/bin
            nim/config
            nim/lib
            nim/nim.nimble
          key: nim-${{ matrix.branch }}-${{ steps.nim-hash.outputs.nim_commit_hash }}-${{ matrix.target.os }}-${{ matrix.target.cpu }}

      - name: Build Nim and Nimble
        if: steps.nim-cache.outputs.cache-hit != 'true'
        env:
          MAKE: make -j4
          ARCH_OVERRIDE: ${{ matrix.target.platform }}
          NIM_COMMIT: ${{ matrix.branch }}
          QUICK_AND_DIRTY_COMPILER: 1
          QUICK_AND_DIRTY_NIMBLE: 1
          CC: gcc
        run: |
          curl -O -L -s -S https://raw.githubusercontent.com/status-im/nimbus-build-system/master/scripts/build_nim.sh
          bash build_nim.sh nim csources dist/nimble NimBinaries

      - name: Add Nim bin to GITHUB_PATH
        run: echo '${{ github.workspace }}/nim/bin' >> $GITHUB_PATH



      - name: Run tests (hashtree_abi via vendor directory import)
        run: |
          nim --version
          nimble --version
          gcc --version
          nimble install -y --depsOnly
          env TEST_LANG="c" NIMFLAGS="${NIMFLAGS}" nimble test
          env TEST_LANG="cpp" NIMFLAGS="${NIMFLAGS}" nimble test

      - name: Remove vendor directory to force hashtree_abi via search path import
        run: |
          rm -rf vendor

      - name: Run tests (hashtree_abi via search path import)
        run: |
          nim --version
          nimble --version
          gcc --version
          nimble install -y --depsOnly
          env TEST_LANG="c" NIMFLAGS="${NIMFLAGS}" nimble test
